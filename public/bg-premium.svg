<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep crimson-to-black base; glow sits lower-right, upper-left stays black for text. -->
    <radialGradient id="base" cx="64%" cy="72%" r="95%">
      <stop offset="0%" stop-color="#5c0913"/>
      <stop offset="32%" stop-color="#2c060c"/>
      <stop offset="66%" stop-color="#0c0305"/>
      <stop offset="100%" stop-color="#050203"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d0009"/>
      <stop offset="45%" stop-color="#c20016"/>
      <stop offset="75%" stop-color="#ff2d3f"/>
      <stop offset="100%" stop-color="#ff5b66"/>
    </linearGradient>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#base)"/>

  <!-- Glossy red light ribbon curving through black, low-left → upper-right. -->
  <g>
    <!-- soft bloom halo -->
    <path d="M -120 760 C 360 600 640 940 1040 600 S 1640 380 1760 300"
          fill="none" stroke="url(#ribbon)" stroke-width="54" stroke-linecap="round"
          filter="url(#bloom)" opacity="0.65"/>
    <!-- main ribbon body -->
    <path d="M -120 760 C 360 600 640 940 1040 600 S 1640 380 1760 300"
          fill="none" stroke="url(#ribbon)" stroke-width="22" stroke-linecap="round"
          filter="url(#soft)"/>
    <!-- bright specular core (automotive sheen) -->
    <path d="M -120 760 C 360 600 640 940 1040 600 S 1640 380 1760 300"
          fill="none" stroke="#ff9aa2" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- gentle vignette to deepen the matte edges -->
  <radialGradient id="vig" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vig)"/>
</svg>
